<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual Family Madness Classic</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0b0f1a;
    color: #fff;
  }

  header {
    background: linear-gradient(90deg, #c8102e, #1d428a);
    padding: 20px;
    text-align: center;
    animation: glow 3s infinite alternate;
  }

  @keyframes glow {
    from { box-shadow: 0 0 10px #c8102e; }
    to { box-shadow: 0 0 25px #1d428a; }
  }

  h1 {
    margin: 0;
    font-size: 2rem;
    letter-spacing: 1px;
  }

  .sub {
    font-size: 0.9rem;
    opacity: 0.8;
  }

  .container {
    max-width: 800px;
    margin: 30px auto;
    padding: 20px;
  }

  .champion {
    background: #1d428a;
    padding: 15px;
    border-left: 5px solid gold;
    margin-bottom: 20px;
    animation: fadeIn 1.5s ease;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #111827;
    overflow: hidden;
  }

  th {
    background: #c8102e;
    padding: 12px;
    text-transform: uppercase;
  }

  td {
    padding: 12px;
    border-bottom: 1px solid #333;
  }

  tr {
    opacity: 0;
    transform: translateY(20px);
    animation: slideIn 0.5s forwards;
  }

  tr:nth-child(even) {
    background: #0f172a;
  }

  @keyframes slideIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.8rem;
    opacity: 0.6;
  }
</style>
</head>

<body>

<header>
  <h1>🏀 Annual Family Madness Classic</h1>
  <div class="sub">Where Brackets Are Made — And Broken</div>
</header>

<div class="container">

  <div id="currentChampion" class="champion"></div>

  <table>
    <thead>
      <tr>
        <th>Year</th>
        <th>Champion</th>
      </tr>
    </thead>
    <tbody id="winners"></tbody>
  </table>

</div>

<footer>
  Family Tradition Since 2000s • Built for Bragging Rights
</footer>

<script>
const winners = [
  { year: 2026, name: "Dain Charbonneau" },
  { year: 2025, name: "Oliver Charbonneau" },
  { year: 2024, name: "Scarlett Charbonneau" },
  { year: 2023, name: "Avalyn Charbonneau & Stella Charbonneau" },
  { year: 2022, name: "Renae Lutner Charbonneau" },
  { year: 2021, name: "Dain Charbonneau" },
  { year: 2020, name: "Canceled due to Covid-19" },
  { year: 2019, name: "Renae Lutner Charbonneau" },
  { year: 2018, name: "David Charbonneau" },
  { year: 2017, name: "Tammy Charbonneau" },
  { year: 2016, name: "Laurene Cianfrani" },
  { year: 2015, name: "Mr C (Anthony Cianfrani)" },
  { year: 2014, name: "Dan Charbonneau" },
  { year: 2013, name: "Tammy Charbonneau" },
  { year: 2012, name: "Dan Charbonneau" },
  { year: 2011, name: "Laurene Cianfrani" },
  { year: 2010, name: "David Charbonneau" },
  { year: 2009, name: "Renae Lutner Charbonneau" },
  { year: 2008, name: "Dan Charbonneau" },
  { year: 2007, name: "Tammy Charbonneau" },
  { year: 2006, name: "Christoph" },
  { year: 2005, name: "Dain Charbonneau" },
  { year: 2004, name: "Steven Charbonneau" },
  { year: 2003, name: "Nicole Charbonneau Schmutte" }
];

// Sort newest first
winners.sort((a, b) => b.year - a.year);

// Highlight latest champion
const champ = winners[0];
document.getElementById("currentChampion").innerHTML =
  `🏆 <strong>${champ.name}</strong> — ${champ.year} Champion`;

// Populate table with animation delay
const table = document.getElementById("winners");

winners.forEach((w, index) => {
  const row = document.createElement("tr");
  row.style.animationDelay = `${index * 0.1}s`;

  row.innerHTML = `
    <td>${w.year}</td>
    <td>${w.name}</td>
  `;

  table.appendChild(row);
});
</script>

</body>
</html>
